<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1547 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 600px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0d0d1f 100%);
            border: 3px solid #00ffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(26, 26, 62, 0.8) 0%, rgba(13, 13, 31, 0.8) 100%);
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .score-container {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 12px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 16px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 100px;
            text-align: right;
        }

        .instructions {
            color: #00ffff;
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .game-over-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 150, 0.1) 100%);
            padding: 40px;
            border-radius: 8px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .modal-content h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
        }

        .modal-content p {
            font-size: 24px;
            margin-bottom: 30px;
            color: #00ffff;
        }

        .modal-content button {
            padding: 15px 40px;
            font-size: 16px;
            margin: 0 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over-modal" id="gameOverModal">
                <div class="modal-content">
                    <h2 id="gameOverTitle">GAME OVER</h2>
                    <p id="finalScore">Final Score: 0</p>
                    <button onclick="location.reload()">Play Again</button>
                </div>
            </div>
        </div>

        <div class="ui-panel">
            <div class="score-container">
                <div class="score-item">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="scoreDisplay">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="bestDisplay">0</div>
                </div>
            </div>
            <div class="controls">
                <div class="status" id="statusDisplay">Ready</div>
                <button id="startBtn" onclick="toggleGame()">Start</button>
            </div>
        </div>

        <div class="instructions">
            ⬆️ CLICK OR SPACE TO JUMP | AVOID OBSTACLES | COLLECT POINTS
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let gameRunning = false;
        let gameActive = true;
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let frames = 0;

        // Player
        const player = {
            x: 80,
            y: canvas.height - 150,
            width: 40,
            height: 40,
            velocityY: 0,
            velocityX: 200,
            jumping: false,
            color: '#00ffff'
        };

        const gravity = 0.6;
        const jumpStrength = -15;
        const groundLevel = canvas.height - 150;

        // Obstacles and collectibles
        let obstacles = [];
        let collectibles = [];
        let spawnRate = 0;

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);

        function jump() {
            if (gameRunning && !player.jumping && gameActive) {
                player.velocityY = jumpStrength;
                player.jumping = true;
            }
        }

        function toggleGame() {
            if (!gameActive) return;
            gameRunning = !gameRunning;
            document.getElementById('startBtn').textContent = gameRunning ? 'Pause' : 'Resume';
            document.getElementById('statusDisplay').textContent = gameRunning ? 'Playing' : 'Paused';
        }

        function spawnObstacle() {
            const types = ['square', 'tall', 'spike'];
            const type = types[Math.floor(Math.random() * types.length)];
            let width, height;

            if (type === 'square') {
                width = 40;
                height = 40;
            } else if (type === 'tall') {
                width = 30;
                height = 80;
            } else {
                width = 50;
                height = 60;
            }

            obstacles.push({
                x: canvas.width,
                y: groundLevel - height,
                width: width,
                height: height,
                type: type,
                passed: false
            });
        }

        function spawnCollectible() {
            collectibles.push({
                x: canvas.width + Math.random() * 200,
                y: Math.random() * (canvas.height - 200) + 100,
                width: 20,
                height: 20,
                collected: false
            });
        }

        function updatePlayer() {
            if (!gameRunning) return;

            // Gravity
            player.velocityY += gravity;
            player.y += player.velocityY;

            // Ground collision
            if (player.y + player.height >= groundLevel) {
                player.y = groundLevel - player.height;
                player.velocityY = 0;
                player.jumping = false;
            }

            // Screen bounds
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
        }

        function updateObstacles() {
            if (!gameRunning) return;

            spawnRate++;
            if (spawnRate > 120) {
                spawnObstacle();
                spawnRate = 0;
            }

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= player.velocityX * (1 / 60);

                // Score for passing obstacles
                if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < player.x) {
                    obstacles[i].passed = true;
                    score += 10;
                }

                // Collision detection
                if (checkCollision(player, obstacles[i])) {
                    endGame();
                }

                // Remove off-screen obstacles
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        function updateCollectibles() {
            if (!gameRunning) return;

            if (Math.random() < 0.005) {
                spawnCollectible();
            }

            for (let i = 0; i < collectibles.length; i++) {
                collectibles[i].x -= player.velocityX * (1 / 60);

                // Collision with player
                if (checkCollision(player, collectibles[i])) {
                    score += 5;
                    collectibles.splice(i, 1);
                    i--;
                    continue;
                }

                // Remove off-screen
                if (collectibles[i].x + collectibles[i].width < 0) {
                    collectibles.splice(i, 1);
                    i--;
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // Draw outline
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.width, player.height);
        }

        function drawObstacles() {
            for (let obstacle of obstacles) {
                if (obstacle.type === 'spike') {
                    ctx.fillStyle = '#ff00ff';
                    ctx.shadowColor = '#ff00ff';
                } else {
                    ctx.fillStyle = '#ff6600';
                    ctx.shadowColor = '#ff6600';
                }
                ctx.shadowBlur = 10;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                ctx.shadowBlur = 0;

                // Outline
                ctx.strokeStyle = obstacle.type === 'spike' ? '#ff00ff' : '#ff6600';
                ctx.lineWidth = 2;
                ctx.strokeRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            }
        }

        function drawCollectibles() {
            for (let collectible of collectibles) {
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(collectible.x + collectible.width / 2, collectible.y + collectible.height / 2, collectible.width / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function drawGround() {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 10]);
            ctx.beginPath();
            ctx.moveTo(0, groundLevel);
            ctx.lineTo(canvas.width, groundLevel);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawUI() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('bestDisplay').textContent = bestScore;
        }

        function endGame() {
            gameRunning = false;
            gameActive = false;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }

            document.getElementById('gameOverModal').style.display = 'flex';
            document.getElementById('finalScore').textContent = `Final Score: ${score}`;
            document.getElementById('statusDisplay').textContent = 'Game Over';
            document.getElementById('startBtn').textContent = 'Game Over';
        }

        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 62, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw background grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // Update and draw
            drawGround();
            updatePlayer();
            updateObstacles();
            updateCollectibles();
            
            drawCollectibles();
            drawObstacles();
            drawPlayer();
            drawUI();

            frames++;
            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
